name: Tag and Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: Create GitHub Release?
        type: boolean
        default: true

jobs:
  manual-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          dry_run: ${{ inputs.dry_run }}
          # Include additional commit types in changelog
          custom_release_rules: |
            chore:patch:Chores
            docs:patch:Documentation
            style:patch:Styles
            refactor:patch:Code Refactoring
            test:patch:Tests
            build:patch:Build System
            ci:patch:CI/CD
            perf:patch:Performance Improvements

      - name: Create GitHub Release
        if: |
          (github.event_name == 'workflow_dispatch' && inputs.create_release == true) ||
          (github.event_name == 'push' && steps.tag.outputs.new_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      - name: Add to Job Summary
        if: steps.tag.outputs.new_tag != ''
        run: |
          echo "## 🏷️ New Tag: ${{ steps.tag.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Changelog" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tag.outputs.changelog }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
